name: NoraBot PR Review (Bedrock)

# このワークフローは tfp-lab/tfp-code-review のテンプレートです。
# 各 Repo が `.github/workflows/claude-review.yml` にコピーして使います。
#
# 仕組み:
#   1. PR head SHA を解決 (issue_comment トリガーでも PR head を見る)
#   2. submodule (.tfp/code-review) を init
#   3. submodule の prompts/CLAUDE.md と instructions/<lang>.instructions.md を読み
#   4. Repo 固有の .tfp/review.md があればそれも読み
#   5. Bedrock 経由で NoraBot (Claude) にレビューさせる
#
# 自動レビュー: PR の open/synchronize/reopened
# 手動再レビュー: PR コメントで `@norabot` を含めて投稿 (例: `@norabot review`)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  # github_token を with: で明示しない場合、action は OIDC で GitHub App token を
  # 取りに行く実装になっているため、id-token: write が必須。
  id-token: write

env:
  # === モデル / リージョン (各 Repo で書き換え可) ===
  # claude-code-action は AWS_BEARER_TOKEN_BEDROCK を直接読みます (公式 docs/cloud-providers.md は OIDC のみと
  # 書かれていますが、実装上は Bearer Token もサポート済み — base-action/src/validate-env.ts 参照)。
  # モデル ID は claude_args の --model で渡します。
  ANTHROPIC_MODEL: jp.anthropic.claude-sonnet-4-6
  AWS_REGION: ap-northeast-1
  # Bedrock API Key (Bearer Token) — secrets に登録済み
  AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}

jobs:
  review:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@norabot'))

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # issue_comment トリガーでは github.event.pull_request は null。
      # PR head SHA を API 経由で取得し、後続 step で使う
      - name: Resolve PR head SHA
        id: prsha
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            if (context.eventName === 'issue_comment') {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              return pr.data.head.sha;
            }
            return context.payload.pull_request.head.sha;

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prsha.outputs.result }}
          submodules: recursive
          fetch-depth: 0

      - name: Resolve reviewer icon (Repo override)
        id: icon
        run: |
          # 各 Repo の .tfp/icon.png があればそれ (PR head SHA で参照)、
          # 無ければ tfp-code-review の main 固定 URL (常に最新かつ public で必ず到達可)。
          if [ -f .tfp/icon.png ]; then
            echo "url=https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.prsha.outputs.result }}/.tfp/icon.png" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://raw.githubusercontent.com/tfp-lab/tfp-code-review/main/assets/icon.png" >> "$GITHUB_OUTPUT"
          fi

      # === リアルタイム rebrand watcher ===
      # action が "Claude Code is working…" 等の固定文言で tracking comment を post してから
      # Claude が応答を返すまでに数十秒〜数分かかる。その間ユーザーは Claude 表記のまま
      # 待たされるため、バックグラウンドで PR コメントをポーリングして即時 rebrand する。
      # Run NoraBot step が終わったら自動的にプロセス終了。
      - name: Start rebrand watcher (background)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'issue_comment' && github.event.issue.number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          cat > /tmp/norabot-rebrand.sh <<'BASH'
          #!/usr/bin/env bash
          set -u
          while :; do
            # 直近 30 件の issue comment を取得して github-actions[bot] 投稿を rebrand
            comments=$(gh api -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/issues/${PR_NUMBER}/comments?per_page=30&sort=created&direction=desc" 2>/dev/null || echo "[]")
            echo "$comments" | python3 -c '
          import json, os, sys, re, subprocess
          repo = os.environ["REPO"]
          try:
              data = json.load(sys.stdin)
          except Exception:
              sys.exit(0)
          if not isinstance(data, list):
              sys.exit(0)
          repls = [
              (re.compile(r"Claude Code is working[…\.]{1,3}"), "NoraBot is reviewing…"),
              (re.compile(r"\*\*Claude finished "), "**NoraBot finished "),
              (re.compile(r"\*\*Claude encountered an error"), "**NoraBot encountered an error"),
              (re.compile(r"Generated with \[Claude Code\]\(https://claude\.ai/code\)"), "Generated with NoraBot"),
              (re.compile(r"Claude Code Action"), "NoraBot"),
          ]
          for c in data:
              if (c.get("user") or {}).get("login") != "github-actions[bot]":
                  continue
              body = c.get("body") or ""
              new = body
              for pat, rep in repls:
                  new = pat.sub(rep, new)
              if new != body:
                  cid = c["id"]
                  subprocess.run(
                      ["gh", "api", "--method", "PATCH",
                       f"/repos/{repo}/issues/comments/{cid}",
                       "-f", f"body={new}"],
                      check=False, capture_output=True,
                  )
          '
            sleep 2
          done
          BASH
          chmod +x /tmp/norabot-rebrand.sh
          # nohup でバックグラウンド起動。Run NoraBot 完了後の Stop watcher で kill
          nohup /tmp/norabot-rebrand.sh > /tmp/norabot-rebrand.log 2>&1 &
          echo $! > /tmp/norabot-rebrand.pid
          echo "Rebrand watcher started (pid=$(cat /tmp/norabot-rebrand.pid))"

      - name: Run NoraBot (Claude Code Action / Bedrock)
        uses: anthropics/claude-code-action@v1
        env:
          REVIEWER_ICON_URL: ${{ steps.icon.outputs.url }}
        with:
          # Bedrock モードを有効化 (action が CLAUDE_CODE_USE_BEDROCK=1 を設定)
          use_bedrock: "true"
          # claude_args:
          # - --model でモデル指定 (action は ANTHROPIC_MODEL env を直接見ない)
          # - --allowedTools で PR コメント投稿系 MCP ツールを明示許可。
          #   未指定だと permission_denials が起きてコメントが post されない事象あり。
          claude_args: |
            --model ${{ env.ANTHROPIC_MODEL }}
            --allowedTools mcp__github_comment__update_claude_comment,mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*)
          # コメントトリガーフレーズ。@norabot review などで再レビューを呼べる
          trigger_phrase: "@norabot"
          # tag mode + tracking comment を強制。「NoraBot is working...」的な進捗コメントが
          # 即座に PR に post され、レビュー完了後にレビュー本文へ更新される。
          # use_sticky_comment は pull_request event 限定で issue_comment では効かないため、
          # こちらを使う。
          track_progress: "true"
          # 公式 Claude GitHub App を install していないため OIDC token 交換が
          # "Claude Code is not installed on this repository" で失敗する。
          # GITHUB_TOKEN を渡すことで OIDC 経路を完全にスキップできる。
          # トレードオフ: 投稿者が github-actions[bot] になり Claude App ブランディングは失われる。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # `mcp__github_ci__*` 系は track_progress 時に action が自動許可するが、
          # 念のため明示せず action 既定に任せる (--allowedTools には commentツールのみ追加)
          prompt: |
            あなたは NoraBot です — TFP の共通レビュー基盤 (tfp-code-review) を使う PR レビュアーです。
            以下の順序でファイルを読み、それらに従ってこの PR の差分を日本語でレビューしてください。

            1. .tfp/code-review/prompts/CLAUDE.md  (全社共通の方針・出力フォーマット)
            2. .tfp/code-review/instructions/<lang>.instructions.md  (PR の主要言語に対応するもの)
               - Go なら go.instructions.md
               - TypeScript / TSX なら typescript.instructions.md
               - PHP なら php.instructions.md
               - 他言語は _template.instructions.md を参考に一般的観点で
            3. .tfp/review.md  (この Repo 固有のルール、存在すれば。共通と矛盾する場合は後者を優先)

            ## 出力フォーマット (Copilot / CodeRabbit 風 + NoraBot 統合)

            出力は **2 種類のコメントを使い分け** ます:

            1. **インラインコメント** (差分行への直接指摘) — `mcp__github_inline_comment__create_inline_comment` ツールを使用。
               must-fix / suggestion レベルの **具体的な修正提案はインラインで** 各ファイル / 各行に付けてください。
               これによりレビュアー (人間) は差分を見ながら指摘を確認できます (CodeRabbit / Copilot review と同じ UX)。

            2. **サマリコメント** (PR トップに 1 件) — `mcp__github_comment__update_claude_comment` ツールでレビューコメントを更新。
               全体サマリ・件数・カテゴリ別目次を載せます。
               **重要**: これを呼ばないと PR トップに何も表示されません。

            ### インラインコメントのルール
            - 必ず `confirmed: true` を付けて post してください (action のフィルタを通すため)
            - 各コメント本文は短く: 「**[must-fix] 〜の理由で〜してください**」+ 必要なら 5 行以内のコード提案
            - 重要度ラベル `[must-fix]` / `[suggestion]` / `[nit]` を **必ず prefix** に
            - inline で付けたら、サマリコメントの該当箇所は「行番号 + 要約」だけにし、詳細は inline 側に書く

            ### サマリコメントの構造

            コメント本文の最初の 2 行は **必ず** 以下とします (画像マークダウンを省略してはいけません):

            ```markdown
            ![NoraBot](${{ steps.icon.outputs.url }})

            ## NoraBot のレビュー
            ```

            続けて以下のテンプレートに従ってください:

            ```markdown
            > このプルリクエストの変更内容を NoraBot がレビューしました。
            > 重要度ラベル: 🔴 [must-fix] / 🟡 [suggestion] / 🔵 [nit]

            ### 📋 サマリ
            <この PR が何をしているかを 2〜3 行で。Copilot のように具体的な変更点を列挙>

            **指摘件数**: 🔴 N 件 / 🟡 M 件 / 🔵 K 件 (← 各カテゴリの件数を明示)

            ### 🔍 指摘事項

            <details open>
            <summary><b>🔴 must-fix (N 件) — 必ず修正してください</b></summary>

            - **`path/to/file.ext:42`** — <指摘の要点>
              <詳細・修正案>

            </details>

            <details>
            <summary><b>🟡 suggestion (M 件) — 改善提案</b></summary>

            - **`path/to/file.ext:88`** — <指摘の要点>

            </details>

            <details>
            <summary><b>🔵 nit (K 件) — 些細な指摘 (任意対応)</b></summary>

            - **`path/to/file.ext:120`** — <些細な指摘>

            </details>

            ### ✅ 良かった点
            - <最低 1 つ。具体的に>

            ---
            <sub>🤖 _Reviewed by **NoraBot** (Claude Sonnet 4.6 via AWS Bedrock) · 共通基盤: [tfp-code-review](https://github.com/tfp-lab/tfp-code-review)_</sub>
            ```

            ### 見やすさのための工夫 (大事)

            - **`<details>` 折りたたみ**: must-fix は `open` 属性で展開、suggestion / nit は折りたたみ。
              読み手が must-fix だけ見て他は必要なら開く構造に
            - **件数を見出しに含める** (例: "🔴 must-fix (3 件)") で全体感を即座に把握可能に
            - **同種指摘の集約**: 同じパターンの指摘が 3 件以上ある場合は、代表 1 件詳述 +
              「他 N 箇所で同様: file:L, file:L, ...」のように行番号リストだけ列挙
            - **コードブロックは 5 行以内** に。長い修正案は要点 (diff 形式) で
            - **1 ファイルに指摘が多い場合**: そのファイル指摘の冒頭に
              `> このファイルは指摘 N 件。最重要のみ詳述、他は概要` と注記

            ### 長さの制約

            GitHub の PR コメントは **約 65,000 文字 (64 KiB)** が上限です。指摘が大量にあって本文が長く
            なってしまっても、workflow 側で **自動的に複数コメントに分割 post** する後処理 (Final rebrand step)
            があるため、あなた (NoraBot) は**必要なら全件を出してください**。
            ただし以下のルールは守ること:

            1. 必ず **重要度の高い順** で出力 (must-fix → suggestion → nit)
            2. 1 段落 (`\n\n` 区切り) が **20,000 文字を超えない** ように分割
               (分割 post の境界は段落単位なので 1 段落が長すぎると 1 コメントに収まらない)
            3. インラインコードブロックは **20 行以内** に

            指摘がカテゴリ別にゼロ件ならその `<details>` ブロックごと省略。ただし「良かった点」は必ず 1 つ以上。

      # === watcher 停止 ===
      - name: Stop rebrand watcher
        if: always()
        run: |
          if [ -f /tmp/norabot-rebrand.pid ]; then
            kill "$(cat /tmp/norabot-rebrand.pid)" 2>/dev/null || true
            echo "Watcher stopped"
          fi
          # ログを出して観察可能に
          if [ -f /tmp/norabot-rebrand.log ]; then
            echo "::group::Watcher log (last 50 lines)"
            tail -n 50 /tmp/norabot-rebrand.log || true
            echo "::endgroup::"
          fi

      # === 最終 rebrand (バックアップ): action 完了直後の "Claude finished" を必ず置換 ===
      - name: Final rebrand "Claude" -> "NoraBot"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const prNumber = eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.pull_request?.number;
            if (!prNumber) {
              core.info('No PR number resolvable, skip rebrand');
              return;
            }

            // 直近 30 件の PR コメントから github-actions[bot] が書いた
            // tracking comment を探し、文言を置換する
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 30,
              sort: 'created',
              direction: 'desc',
            });

            const replacements = [
              [/Claude Code is working[…\.]{1,3}/g, 'NoraBot is reviewing…'],
              [/\*\*Claude finished /g, '**NoraBot finished '],
              [/\*\*Claude encountered an error/g, '**NoraBot encountered an error'],
              [/Generated with \[Claude Code\]\(https:\/\/claude\.ai\/code\)/g, 'Generated with NoraBot'],
              [/Claude Code Action/g, 'NoraBot'],
            ];

            // GitHub の issue/PR コメント本文上限 (実際は 65536 bytes だが念のため余裕)
            const MAX_COMMENT_LEN = 60000;
            const CHUNK_SUFFIX = '\n\n---\n> ⏩ 続きは下のコメントへ ↓';
            const CHUNK_PREFIX_FMT = (i, n) =>
              `> 📄 NoraBot レビュー (続き ${i}/${n})\n\n`;

            // バイト境界ではなく安全に分割 (見出しや markdown を可能な限り保つ)
            // 戦略: MAX 以下なら 1 件、超えたら段落 ("\n\n") 単位で詰めて分割
            function splitIntoChunks(text) {
              if (text.length <= MAX_COMMENT_LEN) return [text];
              const paragraphs = text.split(/\n\n+/);
              const chunks = [];
              let buf = '';
              for (const p of paragraphs) {
                const candidate = buf ? buf + '\n\n' + p : p;
                // 1 段落だけで MAX 超のときはハードに切る
                if (p.length > MAX_COMMENT_LEN) {
                  if (buf) { chunks.push(buf); buf = ''; }
                  for (let i = 0; i < p.length; i += MAX_COMMENT_LEN - 200) {
                    chunks.push(p.slice(i, i + MAX_COMMENT_LEN - 200));
                  }
                  continue;
                }
                if (candidate.length + CHUNK_SUFFIX.length > MAX_COMMENT_LEN) {
                  chunks.push(buf);
                  buf = p;
                } else {
                  buf = candidate;
                }
              }
              if (buf) chunks.push(buf);
              return chunks;
            }

            // 全マッチ対象を更新 (1 件で break しない)
            for (const c of comments) {
              if (c.user?.login !== 'github-actions[bot]') continue;
              if (!c.body) continue;
              let updated = c.body;
              let changed = false;
              for (const [pat, rep] of replacements) {
                if (pat.test(updated)) {
                  updated = updated.replace(pat, rep);
                  changed = true;
                }
              }
              if (!changed && updated.length <= MAX_COMMENT_LEN) continue;

              if (updated.length <= MAX_COMMENT_LEN) {
                // 通常 rebrand
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                  body: updated,
                });
                core.info(`Rebranded comment ${c.id} on PR #${prNumber}`);
                continue;
              }

              // 長すぎる場合: 先頭 chunk で元コメントを更新、残りは続きコメントを post
              const chunks = splitIntoChunks(updated);
              core.warning(`Comment ${c.id} too long (${updated.length}). Splitting into ${chunks.length} chunks.`);

              // 1 chunk 目: 元コメントを更新 + 続きへの誘導
              const firstBody =
                chunks[0] +
                (chunks.length > 1 ? CHUNK_SUFFIX : '');
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: c.id,
                body: firstBody,
              });

              // 2 chunk 目以降: 新規コメントとして post
              for (let i = 1; i < chunks.length; i++) {
                const body =
                  CHUNK_PREFIX_FMT(i + 1, chunks.length) +
                  chunks[i] +
                  (i < chunks.length - 1 ? CHUNK_SUFFIX : '');
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                });
              }
              core.info(`Posted ${chunks.length} chunked comments on PR #${prNumber}`);
            }
