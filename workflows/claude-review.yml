name: NoraBot PR Review (Bedrock)

# このワークフローは tfp-lab/tfp-code-review のテンプレートです。
# 各 Repo が `.github/workflows/claude-review.yml` にコピーして使います。
#
# 仕組み:
#   1. submodule (.tfp/code-review) を init
#   2. submodule の prompts/CLAUDE.md と instructions/<lang>.instructions.md を読み
#   3. Repo 固有の .tfp/review.md があればそれも読み
#   4. Bedrock 経由で NoraBot (Claude) にレビューさせる
#
# 自動レビュー: PR の open/synchronize/reopened
# 手動再レビュー: PR コメントで `@NoraBot` を含めて投稿 (例: `@NoraBot review`)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

env:
  # === モデル / リージョン (各 Repo で書き換え可) ===
  # claude-code-action は AWS_BEARER_TOKEN_BEDROCK を直接読みます (公式 docs/cloud-providers.md は OIDC のみと
  # 書かれていますが、実装上は Bearer Token もサポート済み — base-action/src/validate-env.ts 参照)。
  # モデル ID は claude_args の --model で渡します。
  ANTHROPIC_MODEL: jp.anthropic.claude-sonnet-4-6
  AWS_REGION: ap-northeast-1
  # Bedrock API Key (Bearer Token) — secrets に登録済み
  AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}

  # === reviewer アイコン ===
  # 共通アイコンを submodule から参照。各 Repo で .tfp/icon.png を置けば優先される (workflow 側ロジックで対応)
  REVIEWER_ICON_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.sha || github.sha }}/.tfp/code-review/assets/icon.png

jobs:
  review:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (contains(github.event.comment.body, '@norabot') ||
        contains(github.event.comment.body, '@NoraBot')))

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve reviewer icon (Repo override)
        id: icon
        run: |
          if [ -f .tfp/icon.png ]; then
            echo "url=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.pull_request.head.sha || github.sha }}/.tfp/icon.png" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ env.REVIEWER_ICON_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NoraBot (Claude Code Action / Bedrock)
        uses: anthropics/claude-code-action@v1
        env:
          REVIEWER_ICON_URL: ${{ steps.icon.outputs.url }}
        with:
          # Bedrock モードを有効化 (action が CLAUDE_CODE_USE_BEDROCK=1 を設定)
          use_bedrock: "true"
          # モデル指定は claude_args 経由 (action は ANTHROPIC_MODEL env を直接見ない)
          claude_args: --model ${{ env.ANTHROPIC_MODEL }}
          # コメントトリガーフレーズ。@norabot review などで再レビューを呼べる
          trigger_phrase: "@norabot"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            あなたは NoraBot です — TFP の共通レビュー基盤 (tfp-code-review) を使う PR レビュアーです。
            以下の順序でファイルを読み、それらに従ってこの PR の差分を日本語でレビューしてください。

            1. .tfp/code-review/prompts/CLAUDE.md  (全社共通の方針・出力フォーマット)
            2. .tfp/code-review/instructions/<lang>.instructions.md  (PR の主要言語に対応するもの)
               - Go なら go.instructions.md
               - TypeScript / TSX なら typescript.instructions.md
               - PHP なら php.instructions.md
               - 他言語は _template.instructions.md を参考に一般的観点で
            3. .tfp/review.md  (この Repo 固有のルール、存在すれば。共通と矛盾する場合は後者を優先)

            出力ルール (詳細は 1 のファイルを参照):
            - レビュー本文は必ず PR コメントとして post してください (inline comment だけでなく必ず 1 件は通常コメントを残す)
            - 最初の行に必ず以下の画像マークダウンを入れる
              ![NoraBot](${{ steps.icon.outputs.url }})
            - 続けて「NoraBot のレビュー」と書く
            - 1 行サマリ
            - [must-fix] / [suggestion] / [nit] の優先度を付けた指摘リスト
            - 最後に良かった点を 1 つ以上
