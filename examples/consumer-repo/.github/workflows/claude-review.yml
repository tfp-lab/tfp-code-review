name: NoraBot PR Review (Bedrock)

# このワークフローは tfp-lab/tfp-code-review のテンプレートです。
# 各 Repo が `.github/workflows/claude-review.yml` にコピーして使います。
#
# 仕組み:
#   1. PR head SHA を解決 (issue_comment トリガーでも PR head を見る)
#   2. submodule (.tfp/code-review) を init
#   3. submodule の prompts/CLAUDE.md と instructions/<lang>.instructions.md を読み
#   4. Repo 固有の .tfp/review.md があればそれも読み
#   5. Bedrock 経由で NoraBot (Claude) にレビューさせる
#
# 自動レビュー: PR の open/synchronize/reopened
# 手動再レビュー: PR コメントで `@norabot` を含めて投稿 (例: `@norabot review`)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  # github_token を with: で明示しない場合、action は OIDC で GitHub App token を
  # 取りに行く実装になっているため、id-token: write が必須。
  id-token: write

env:
  # === モデル / リージョン (各 Repo で書き換え可) ===
  # claude-code-action は AWS_BEARER_TOKEN_BEDROCK を直接読みます (公式 docs/cloud-providers.md は OIDC のみと
  # 書かれていますが、実装上は Bearer Token もサポート済み — base-action/src/validate-env.ts 参照)。
  # モデル ID は claude_args の --model で渡します。
  ANTHROPIC_MODEL: jp.anthropic.claude-sonnet-4-6
  AWS_REGION: ap-northeast-1
  # Bedrock API Key (Bearer Token) — secrets に登録済み
  AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}

jobs:
  review:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@norabot'))

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # issue_comment トリガーでは github.event.pull_request は null。
      # PR head SHA を API 経由で取得し、後続 step で使う
      - name: Resolve PR head SHA
        id: prsha
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            if (context.eventName === 'issue_comment') {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              return pr.data.head.sha;
            }
            return context.payload.pull_request.head.sha;

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prsha.outputs.result }}
          submodules: recursive
          fetch-depth: 0

      - name: Resolve reviewer icon (Repo override)
        id: icon
        run: |
          if [ -f .tfp/icon.png ]; then
            echo "url=https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.prsha.outputs.result }}/.tfp/icon.png" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.prsha.outputs.result }}/.tfp/code-review/assets/icon.png" >> "$GITHUB_OUTPUT"
          fi

      - name: Run NoraBot (Claude Code Action / Bedrock)
        uses: anthropics/claude-code-action@v1
        env:
          REVIEWER_ICON_URL: ${{ steps.icon.outputs.url }}
        with:
          # Bedrock モードを有効化 (action が CLAUDE_CODE_USE_BEDROCK=1 を設定)
          use_bedrock: "true"
          # claude_args:
          # - --model でモデル指定 (action は ANTHROPIC_MODEL env を直接見ない)
          # - --allowedTools で PR コメント投稿系 MCP ツールを明示許可。
          #   未指定だと permission_denials が起きてコメントが post されない事象あり。
          claude_args: |
            --model ${{ env.ANTHROPIC_MODEL }}
            --allowedTools mcp__github_comment__update_claude_comment,mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh api:*)
          # コメントトリガーフレーズ。@norabot review などで再レビューを呼べる
          trigger_phrase: "@norabot"
          # tag mode + tracking comment を強制。「NoraBot is working...」的な進捗コメントが
          # 即座に PR に post され、レビュー完了後にレビュー本文へ更新される。
          # use_sticky_comment は pull_request event 限定で issue_comment では効かないため、
          # こちらを使う。
          track_progress: "true"
          # 公式 Claude GitHub App を install していないため OIDC token 交換が
          # "Claude Code is not installed on this repository" で失敗する。
          # GITHUB_TOKEN を渡すことで OIDC 経路を完全にスキップできる。
          # トレードオフ: 投稿者が github-actions[bot] になり Claude App ブランディングは失われる。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            あなたは NoraBot です — TFP の共通レビュー基盤 (tfp-code-review) を使う PR レビュアーです。
            以下の順序でファイルを読み、それらに従ってこの PR の差分を日本語でレビューしてください。

            1. .tfp/code-review/prompts/CLAUDE.md  (全社共通の方針・出力フォーマット)
            2. .tfp/code-review/instructions/<lang>.instructions.md  (PR の主要言語に対応するもの)
               - Go なら go.instructions.md
               - TypeScript / TSX なら typescript.instructions.md
               - PHP なら php.instructions.md
               - 他言語は _template.instructions.md を参考に一般的観点で
            3. .tfp/review.md  (この Repo 固有のルール、存在すれば。共通と矛盾する場合は後者を優先)

            出力ルール:
            - **必ず `mcp__github_comment__update_claude_comment` ツールを使ってレビュー本文を PR トップのトラッキングコメントに更新してください**。これを呼ばないと PR 上に何も表示されません。
            - コメント本文の最初の行に必ず以下の画像マークダウンを入れる
              ![NoraBot](${{ steps.icon.outputs.url }})
            - 続けて「# NoraBot のレビュー」と書く
            - 1 行サマリ
            - [must-fix] / [suggestion] / [nit] の優先度を付けた指摘リスト
            - 最後に良かった点を 1 つ以上
