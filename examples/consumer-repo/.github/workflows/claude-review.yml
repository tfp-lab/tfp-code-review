name: NoraBot PR Review

# このワークフローは tfp-lab/tfp-code-review が提供する Reusable workflow を呼び出すだけの caller です。
# 各 Repo はこのファイルをそのまま `.github/workflows/claude-review.yml` にコピーし、
# 必要なら `with:` でモデルやリージョンを上書きするだけで導入完了。
#
# 共通方針 (prompt / instructions / 出力フォーマット / rebrand 等) の改修は
# tfp-lab/tfp-code-review main の `.github/workflows/review.reusable.yml` を更新すれば
# **全 caller に即反映** されます。各 Repo 側で submodule update や workflow コピーは不要です。

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    uses: tfp-lab/tfp-code-review/.github/workflows/review.reusable.yml@main
    secrets:
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
    # 任意: モデルやリージョンをこの Repo 用に上書きする場合のみ
    # with:
    #   model: jp.anthropic.claude-sonnet-4-6
    #   aws_region: ap-northeast-1
